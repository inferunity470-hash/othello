name: CI

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Unit + integration tests
        run: npm test
      - name: Guard observability env vars (privacy)
        # The app declares "no server communication" in PRIVACY.md.
        # Block any CI build that would bake a non-empty error webhook
        # URL into the production bundle.
        run: |
          if [ -n "${VITE_ERROR_WEBHOOK_URL:-}" ]; then
            echo "::error::VITE_ERROR_WEBHOOK_URL must be empty in CI builds (privacy guarantee)."
            exit 1
          fi
      - name: Production build
        run: npm run build
      - name: Verify build has no inlined webhook URL
        # With VITE_ERROR_WEBHOOK_URL unset, Vite replaces the constant
        # with `undefined`. If the WEBHOOK constant has a truthy string
        # baked in, the privacy guarantee is broken.
        run: node scripts/check-no-webhook.mjs

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright
        run: npm run test:e2e
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
